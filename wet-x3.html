<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WET-X2</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #121121;
    font-family: 'Montserrat', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: white;
    overflow: hidden;

    background-image: radial-gradient(rgba(128, 128, 128, 0.2) 1px, transparent 0);
    background-size: 30px 30px;
    background-position: 30px 30px;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .top-glow {
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 80px;
    z-index: 1;
  }

  .glow-image {
    width: 80%;
    max-width: 500px;
    object-fit: contain;
    animation: pulseGlow 2.5s infinite ease-in-out;
  }

  @keyframes pulseGlow {
    0% {
      filter: drop-shadow(0 0 15px rgba(255,0,0,0.5)) drop-shadow(0 0 30px rgba(255,0,0,0.5));
      transform: scale(1);
    }
    50% {
      filter: drop-shadow(0 0 40px rgba(255,0,0,0.5)) drop-shadow(0 0 40px rgba(255,0,0,0.5));
      transform: scale(1.05);
    }
    100% {
      filter: drop-shadow(0 0 15px rgba(255,0,0,0.5)) drop-shadow(0 0 50px rgba(255,0,0,0.5));
      transform: scale(1);
    }
  }

  .content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  .text-stack {
    display: flex;
    flex-direction: column;
    gap: 15px;
    max-width: 700px;
    position: relative;
    z-index: 1;
  }

  .text-large { font-size: 28px; font-weight: 700; }
  .text-medium { font-size: 18px; font-weight: 400; line-height: 1.6; }
    
  span {
    display: none;
  }

  /* Desktop enhancements */
  @media (min-width: 1024px) {
    span {
        display: block;
        font-style: italic;
        color: rgba(128, 128, 128, 0.3);
        position: absolute;
        top: 10px;
        left: 10px;
    }
  }

  .background-img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    max-width: 600px;
    opacity: 0.1;
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
    <span>WET-<b style="color:#FF0000">T</b>2</span>

<canvas id="redToken"></canvas>

<div class="top-glow">
  <img src="WET1_1@4x.png" class="glow-image" />
</div>

<div class="content">
  <img src="WET1_B@2x.png" class="background-img" />

  <div class="text-stack">
    <div class="text-large"><b>5XWF0 CBL</b> Wireless Energy Transfer Token</div>
    <div class="text-medium">
      Property of the course and its main lecturer.
      If found, or if not deemed worthy, return to 
      the course lecturer or the Flux building reception desk.
    </div>
    <div class="text-large">“<b style="color:#FF0000">T</b>ransfer of energy demands responsibility.”</div>
  </div>
</div>

<canvas id="redToken"></canvas>
<script>
const canvas = document.getElementById('redToken');
const ctx = canvas.getContext('2d');

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Get the glowing image
const glowImage = document.querySelector('.glow-image');

function getCenterPosition() {
  const rect = glowImage.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  return { centerX, centerY };
}

// Pulsing rings array
let rings = [];

// Tunable parameters
const pulseFrequency = 100;  // frames between new pulses
const ringSpeed = 0.5;       // how fast rings expand
const maxRadius = 800;       // maximum radius before disappearing

let frameCount = 0;

function animate() {
  ctx.clearRect(0, 0, width, height);

  const { centerX, centerY } = getCenterPosition();

  // Add new ring occasionally
  frameCount++;
  if (frameCount % pulseFrequency === 0) {
    rings.push({ radius: 0, alpha: 1 });
  }

  // Draw and update rings
  for (let i = rings.length - 1; i >= 0; i--) {
    const ring = rings[i];
    ring.radius += ringSpeed;
    ring.alpha -= 0.001;

    ctx.beginPath();
    ctx.arc(centerX, centerY, ring.radius, 0, Math.PI * 2);

    // Glow effect
    ctx.shadowBlur = 10;
    ctx.shadowColor = `rgba(255,0,0,${ring.alpha})`;
    ctx.strokeStyle = `rgba(255,0,0,${ring.alpha})`;
    ctx.lineWidth = 5;
    ctx.stroke();

    // Remove faded rings
    if (ring.alpha <= 0) {
      rings.splice(i, 1);
    }
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
